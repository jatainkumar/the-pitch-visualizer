<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Pitch Visualizer</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>
    <div class="app-container">
        <header class="hero">
            <h1 class="classic-title">The Pitch Visualizer</h1>
            <p class="subtitle">Turn your narrative into a visual storyboard.</p>
        </header>



        <main>
            <section class="input-section">
                <form id="generate-form">
                    <div class="form-group">
                        <textarea id="narrative-text" placeholder="Type a 3-5 sentence success story here..." required></textarea>
                    </div>
                    
                    <div class="form-group">
                        <select id="visual-style">
                            <option value="Cinematic lighting, hyper-detailed, masterpiece">Cinematic</option>
                            <option value="Digital art, trending on artstation, vibrant colors">Digital Art</option>
                            <option value="Photorealistic, 8k resolution, award-winning photography">Photorealistic</option>
                            <option value="Cyberpunk, neon lights, futuristic">Cyberpunk</option>
                            <option value="Watercolor illustration, soft and elegant">Watercolor</option>
                            <option value="Comic book art style, cel shaded, ink lines">Comic Book</option>
                            <option value="Minimalist vector art, clean lines">Minimalist</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <select id="image-ratio">
                            <option value="16:9">Widescreen (16:9)</option>
                            <option value="1:1">Square (1:1)</option>
                            <option value="9:16">Portrait (9:16)</option>
                        </select>
                    </div>
                    
                    <button type="submit" id="generate-btn" class="primary-btn">
                        <span class="btn-text">Generate Story</span>
                        <div class="spinner hidden"></div>
                    </button>
                </form>
                
                <div id="loading-state" class="hidden">
                    <p id="loading-message">Analyzing...</p>
                    <div class="main-progress-container">
                        <div class="main-progress-bar" id="main-progress-bar"></div>
                    </div>
                    <div class="progress-text" id="progress-text">0%</div>
                </div>
            </section>
            
            <section class="history-section hidden" id="history-section">
                <h3 class="history-title">Session History</h3>
                <div class="history-grid" id="history-grid">
                    <!-- History cards injected dynamically -->
                </div>
            </section>
        </main>
        
        <footer>
            <p>Made with ❤️ by <strong>Jatain</strong> for Darwix assessment.</p>
        </footer>
    </div>

    <!-- Slideshow Modal -->
    <div id="slideshow-modal" class="modal hidden">
        <div class="modal-content">
            <span class="close-btn">&times;</span>
            <div class="top-left-controls">
                <div class="slide-counter" id="slide-counter">1 / 3</div>
                <button id="download-pdf-btn" class="sm-btn hidden">
                    <svg viewBox="0 0 24 24" width="12" height="12" stroke="currentColor" stroke-width="2" fill="none" class="icon"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                    Download PDF
                </button>
            </div>
            
            <div class="slideshow-container" id="slideshow-container">
                <!-- Slides injected dynamically -->
            </div>
            
            <!-- Slideshow Controls -->
            <div class="slideshow-controls">
                <button id="prev-btn" class="control-btn">&#10094;</button>
                <div class="progress-bar-container">
                    <div class="progress-bar" id="slide-progress"></div>
                </div>
                <button id="next-btn" class="control-btn">&#10095;</button>
            </div>
        </div>
    </div>
    
    <script src="/static/script.js"></script>
</body>
</html>
